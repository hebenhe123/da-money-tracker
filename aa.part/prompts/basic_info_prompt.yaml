system_prompt: |
  你是一位专业的金融公告信息抽取专家，擅长从上市公司公告中准确提取结构化数据。
  请仔细阅读以下公告文本，严格按照指定的字段定义进行信息抽取。
  所有输出必须是严格的 JSON 格式，不包含任何额外文字或解释。
  如果某个字段在公告中无法找到，请将其值设为 null。

input_template: |
  请从以下公告文本中提取基础信息字段，输出格式为严格 JSON：
  
  **字段定义：**
  - company_name：公司全称，与公告中完全一致
  - stock_code：6位数字股票代码
  - announcement_date：公告日期，格式 YYYY-MM-DD
  - report_year：会计年度，整数
  - board_type：板块，可选值 ["主板", "创业板", "科创板", "北交所"]
  - announcement_title：公告标题
  
  **公告文本：**
  {announcement_text}
  
  **输出（仅 JSON）：**

few_shot_examples:
  - input: |
      证券代码：300750 证券简称：宁德时代 公告编号：2024-001
      宁德时代新能源科技股份有限公司
      关于募集资金年度存放与使用情况的专项报告
      本公司及董事会全体成员保证信息披露内容的真实、准确和完整，没有虚假记载、误导性陈述或重大遗漏。
      一、募集资金基本情况
      截至2024年12月31日，本公司募集资金专户余额为人民币XX元。
      特此公告。
      宁德时代新能源科技股份有限公司董事会
      2025年3月15日
    output: |
      {"company_name":"宁德时代新能源科技股份有限公司","stock_code":"300750","announcement_date":"2025-03-15","report_year":2024,"board_type":"创业板","announcement_title":"关于募集资金年度存放与使用情况的专项报告"}
  
  - input: |
      证券代码：601012 证券简称：隆基绿能 公告编号：临2024-056
      隆基绿能科技股份有限公司
      2024年年度报告摘要
      重要提示
      本公司董事会、监事会及董事、监事、高级管理人员保证年度报告内容的真实、准确、完整，不存在虚假记载、误导性陈述或重大遗漏，并承担个别和连带的法律责任。
      一、重要提示
      1.1 公司简介
      公司名称：隆基绿能科技股份有限公司
      股票上市交易所：上海证券交易所
      股票简称：隆基绿能
      股票代码：601012
      报告期：2024年1月1日至2024年12月31日
      二、财务摘要
      ...
      2025年4月20日
    output: |
      {"company_name":"隆基绿能科技股份有限公司","stock_code":"601012","announcement_date":"2025-04-20","report_year":2024,"board_type":"主板","announcement_title":"2024年年度报告摘要"}
  
  - input: |
      证券代码：688001 证券简称：华兴源创 公告编号：2024-023
      苏州华兴源创科技股份有限公司
      关于使用部分闲置募集资金进行现金管理的公告
      本公司董事会及全体董事保证本公告内容不存在任何虚假记载、误导性陈述或者重大遗漏，并对其内容的真实性、准确性和完整性依法承担法律责任。
      一、募集资金基本情况
      ...
      特此公告。
      苏州华兴源创科技股份有限公司
      2024年11月8日
    output: |
      {"company_name":"苏州华兴源创科技股份有限公司","stock_code":"688001","announcement_date":"2024-11-08","report_year":2024,"board_type":"科创板","announcement_title":"关于使用部分闲置募集资金进行现金管理的公告"}
