# 工作流配置文件

workflow:
  # 运行模式
  mode: "full"  # full, parse, route, extract, demo

  # 输入输出
  input:
    pdf_dir: "data/pdf"
    markdown_dir: "data/markdown"
  output:
    sections_dir: "output/sections"
    results_dir: "outputs/results"
    logs_dir: "outputs/logs"

  # 并发配置
  concurrency:
    max_workers: 4
    batch_size: 10

  # 重试配置
  retry:
    max_attempts: 3
    backoff_factor: 2

  # 缓存配置
  cache:
    enabled: true
    dir: ".cache"

  # 日志配置
  logging:
    level: "INFO"
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    file: "outputs/logs/run.log"