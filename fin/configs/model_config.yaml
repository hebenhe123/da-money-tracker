# 模型配置文件

model_config:
  # LLM配置
  llm:
    provider: "openai"  # openai, deepseek, qwen
    base_url: "https://api.openai.com/v1"
    api_key_env: "LLM_API_KEY"
    model: "gpt-4o"
    temperature: 0.3
    max_tokens: 2000
    timeout: 60

  # PDF解析配置
  pdf_parser:
    primary: "mineru"  # mineru, pdfplumber
    fallback: "pdfplumber"
    ocr_enabled: false

  # 章节路由配置
  section_router:
    min_score: 0.3
    max_sections: 10
    deduplicate: true

  # 信息抽取配置
  info_extractor:
    confidence_threshold: 0.7
    max_retries: 2