# 任务配置文件

task:
  name: "上市公司募集资金用途与变更跟踪的结构化抽取研究"
  version: "1.0.0"
  description: "从上市公司募集资金相关公告中抽取结构化信息"

# 数据范围
data_scope:
  sources:
    - name: "巨潮资讯网"
      url: "http://www.cninfo.com.cn"
  announcement_types:
    - "募集资金使用情况专项报告"
    - "募投项目变更公告"
    - "募投项目延期公告"
    - "募集资金存放与使用情况鉴证报告"
  time_range:
    start: "2020-01-01"
    end: "2024-12-31"
  sample_size: 100

# 处理流程
pipeline:
  steps:
    - name: "pdf_parse"
      enabled: true
      timeout: 300
    - name: "section_route"
      enabled: true
      timeout: 60
    - name: "info_extract"
      enabled: true
      timeout: 120
    - name: "validation"
      enabled: true
      timeout: 30

# 质量要求
quality:
  min_section_accuracy: 0.90
  min_field_accuracy: 0.85
  min_evidence_quality: 0.80